# Local-dev only -- stands in for RDS so api-deployment.yaml, the migrate/seed
# Jobs, and the Ingress path routing can all be verified against a real
# Kubernetes API (via `kind`) without an AWS account. Not part of the EKS
# deploy -- see the comment in ../configmap.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: huntquest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: huntquest
            - name: POSTGRES_PASSWORD
              value: huntquest
            - name: POSTGRES_DB
              value: huntquest
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "huntquest"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: huntquest
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
